<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Subtle gradient for the beams -->
    <linearGradient id="beamGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4453b"/>
      <stop offset="100%" stop-color="#a8322a"/>
    </linearGradient>
    <linearGradient id="pillarGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="50%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#2a2a2a"/>
    </linearGradient>
  </defs>

  <!-- === TORII GATE === -->
  <g transform="translate(300, 20)">
    <!-- Top beam (kasagi) - elegant curve -->
    <path d="M-200,70 Q-210,62 -195,55 L-180,50 Q0,30 180,50 L195,55 Q210,62 200,70 L180,68 Q0,50 -180,68 Z" fill="url(#beamGrad)"/>
    <!-- Kasagi end caps - curved upward tips -->
    <path d="M-200,70 Q-215,72 -220,60 Q-218,48 -195,55 L-180,68 Z" fill="url(#beamGrad)"/>
    <path d="M200,70 Q215,72 220,60 Q218,48 195,55 L180,68 Z" fill="url(#beamGrad)"/>

    <!-- Island beam (shimaki) - thin line under kasagi -->
    <rect x="-170" y="75" width="340" height="8" rx="2" fill="url(#beamGrad)" opacity="0.85"/>

    <!-- Tie beam (nuki) - connects pillars -->
    <rect x="-140" y="105" width="280" height="14" rx="3" fill="url(#beamGrad)"/>

    <!-- Center tablet (gakuzuka) -->
    <rect x="-40" y="80" width="80" height="38" rx="4" fill="#1a1a1a" stroke="url(#beamGrad)" stroke-width="2"/>
    <!-- Kanji-style mark in tablet -->
    <text x="0" y="106" text-anchor="middle" font-family="serif" font-size="22" font-weight="bold" fill="#d4453b">鳥居</text>

    <!-- Left pillar (hashira) -->
    <rect x="-125" y="75" width="18" height="200" fill="url(#pillarGrad)"/>
    <!-- Right pillar (hashira) -->
    <rect x="107" y="75" width="18" height="200" fill="url(#pillarGrad)"/>

    <!-- Pillar bases -->
    <ellipse cx="-116" cy="275" rx="22" ry="6" fill="#1a1a1a"/>
    <ellipse cx="116" cy="275" rx="22" ry="6" fill="#1a1a1a"/>
  </g>

  <!-- === BRAND TEXT === -->
  <!-- Main name -->
  <text x="300" y="340" text-anchor="middle" font-family="'Georgia', 'Times New Roman', serif" font-size="52" font-weight="bold" letter-spacing="12" fill="#1a1a1a">KIRA KAI</text>

  <!-- Tagline -->
  <text x="300" y="370" text-anchor="middle" font-family="'Georgia', 'Times New Roman', serif" font-size="14" letter-spacing="6" fill="#888">RESTAURANT &amp; BAR</text>

  <!-- Decorative line under tagline -->
  <line x1="220" y1="382" x2="380" y2="382" stroke="#d4453b" stroke-width="1.5" opacity="0.6"/>
</svg>
